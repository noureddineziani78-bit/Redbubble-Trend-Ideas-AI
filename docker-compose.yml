services:
  red-trend-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: red-trend-ai-container
    ports:
      - "3000:3000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL:-http://localhost:3000}
      - NODE_ENV=production
    restart: always
